services:
  postgres:
    image: postgres:16-alpine
    container_name: pakalon-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pakalon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pakalon}
      POSTGRES_DB: ${POSTGRES_DB:-pakalon}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pakalon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pakalon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chrome DevTools for Phase 2/3 TDD screenshot testing
  chrome:
    image: browserless/chrome:latest
    container_name: pakalon-chrome
    restart: unless-stopped
    ports:
      - "3002:3000"  # browserless web UI (keep 3000 free for pakalon-web)
      - "9222:9222"  # DevTools protocol
    volumes:
      - chrome_data:/workspace
    environment:
      - CONNECTION_TIMEOUT=60000
      - MAX_CONCURRENT_SESSIONS=10
      - PREBOOT_CHROME=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chrome_data:
